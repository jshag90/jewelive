# Firebase App Hosting configuration for the `jewelive` backend.
# The backend rootDir is the repository root. App Hosting will detect the
# root `package.json` and automatically run:
#   install: npm ci
#   build:   npm run build   (→ builds the Vite frontend into frontend/dist)
#   start:   npm start       (→ boots apphosting-server.js, which mounts the
#                              Express API from frontend/runtime-server.cjs and
#                              serves frontend/dist as the SPA)

runConfig:
  minInstances: 0
  maxInstances: 1
  cpu: 1
  memoryMiB: 512
  concurrency: 80
