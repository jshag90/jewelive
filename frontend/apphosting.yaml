# Firebase App Hosting starter configuration for Jewel-Live.
# This frontend is currently a Vite React app. App Hosting is optimized for
# Next.js, Angular, or frameworks that emit a compatible output bundle, so this
# file is a placeholder until the frontend migration is completed.
# Firebase App Hosting does not currently support the Seoul region
# (asia-northeast3). Use asia-east1 (Taiwan) for the App Hosting backend until
# Seoul is added.

runConfig:
  minInstances: 0
  maxInstances: 1

scripts:
  buildCommand: npm ci && npm run build
  runCommand: npm start

outputFiles:
  serverApp:
    include:
      - dist
      - node_modules
      - server.cjs
      - runtime-server.cjs
      - package.json
      - package-lock.json
